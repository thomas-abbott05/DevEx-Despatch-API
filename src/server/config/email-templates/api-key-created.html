<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevEx Despatch API Key Information</title>
  </head>
  <body style="margin: 0; padding: 0; background: #f2f0eb;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background: #f2f0eb;">
      <tr>
        <td align="center" style="padding: 28px 14px;">
          <table role="presentation" cellpadding="0" cellspacing="0" width="640" style="width: 100%; max-width: 640px; background: #ffffff; border: 1px solid #ded9cf; border-radius: 14px; box-shadow: 0 8px 28px rgba(20, 20, 20, 0.08);">
            <tr>
              <td align="center" style="padding: 28px 32px 6px 32px; font-family: Georgia, 'Times New Roman', serif; font-size: 29px; line-height: 1.2; color: #1f2a37; letter-spacing: 0.3px;">
                DevEx Despatch
              </td>
            </tr>
            <tr>
              <td align="center" style="padding: 0 32px 18px 32px; font-family: Arial, sans-serif; font-size: 13px; color: #6b7280; letter-spacing: 1px; text-transform: uppercase;">
                API Key Provisioning
              </td>
            </tr>
            <tr>
              <td style="padding: 0 36px 12px 36px; font-family: Arial, sans-serif; font-size: 16px; line-height: 1.6; color: #2b2b2b; text-align: center;">
                Hi {{contactName}} ({{teamName}} team),
              </td>
            </tr>
            <tr>
              <td style="padding: 0 36px 12px 36px; font-family: Arial, sans-serif; font-size: 15px; line-height: 1.7; color: #3a3a3a; text-align: center;">
                Your new DevEx Despatch API key is ready. Keep it private and only use it within your team.
              </td>
            </tr>
            <tr>
              <td style="padding: 8px 36px 14px 36px;">
                <div style="padding: 14px 16px; border: 1px solid #d9d3c8; border-radius: 10px; background: #faf8f4; font-family: 'Courier New', monospace; font-size: 14px; color: #1f2937; text-align: center; word-break: break-all;">
                  {{apiKey}}
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding: 4px 36px 10px 36px; font-family: Arial, sans-serif; font-size: 14px; line-height: 1.7; color: #4b5563; text-align: center;">
                Questions? Email <a href="mailto:{{supportEmail}}" style="color: #1f3d5b; text-decoration: none;">{{supportEmail}}</a>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding: 4px 36px 24px 36px;">
                <a href="{{docsUrl}}" style="display: inline-block; padding: 10px 18px; border-radius: 999px; background: #1f3d5b; color: #ffffff; text-decoration: none; font-family: Arial, sans-serif; font-size: 13px; letter-spacing: 0.3px;">View API Documentation</a>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding: 14px 20px 24px 20px; border-top: 1px solid #eee9de; font-family: Arial, sans-serif; font-size: 12px; color: #6b7280;">
                <div style="width: 28px; height: 28px; margin: 0 auto 8px auto; border-radius: 50%; background: #1f3d5b; color: #f7f5f0; line-height: 28px; font-weight: 700; font-size: 12px; text-align: center;">DX</div>
                DevEx Platform
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
